<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vault</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <!-- Semaforo -->
    <div id="saveStatus" class="statusIndicator ok">🟢 Salvato</div>

    <h1>Vault 🔐</h1>

    <!-- ORDINAMENTO -->
    <div class="sortWrapper">
      <select id="sortSelect" onchange="applySort()" class="sortMenu">
        <option value="recent">📅 Recenti</option>
        <option value="az">🔤 Nome A → Z</option>
        <option value="za">🔤 Nome Z → A</option>
      </select>
    </div>

    <div class="form">

      <input id="title" placeholder="Titolo / Servizio">
      <input id="username" placeholder="Username">
      <input id="password" placeholder="Password">
      <input id="pin" placeholder="PIN (opzionale)">
      <input id="url" placeholder="URL (opzionale)">
      <textarea id="note" placeholder="Note"></textarea>

      <button id="addBtn" class="btn-crazy" onclick="addEntry()">➕ Nuova voce</button>

    </div>

    <h2>Voci salvate</h2>
    <div id="list"></div>

  </div>


  <script src="app.js"></script>
</body>
</html>
